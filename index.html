<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download Latest APK</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0f172a;
            background-image: 
                radial-gradient(at 0% 0%, rgba(30, 58, 138, 0.5) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(17, 24, 39, 1) 0px, transparent 50%);
            min-height: 100vh;
        }
        .glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="flex items-center justify-center p-6 text-slate-200">

    <div class="glass max-w-md w-full rounded-3xl p-8 shadow-2xl text-center transition-all duration-300 hover:shadow-blue-500/10">
        <!-- App Icon Placeholder -->
        <div class="mx-auto w-24 h-24 bg-gradient-to-tr from-green-400 to-emerald-600 rounded-2xl mb-6 flex items-center justify-center shadow-lg transform -rotate-3">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-14 w-14 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
            </svg>
        </div>

        <h1 class="text-3xl font-bold text-white mb-2 tracking-tight">Get the App</h1>
        <p class="text-slate-400 mb-8 leading-relaxed">
            Download the latest stable version of our Android application directly to your device.
        </p>

        <!-- Version Info -->
        <div class="flex justify-center gap-4 mb-8 text-sm">
            <div class="bg-slate-800/50 px-3 py-1 rounded-full border border-slate-700">
                <span class="text-slate-500">Version:</span> 2.4.0
            </div>
            <div class="bg-slate-800/50 px-3 py-1 rounded-full border border-slate-700">
                <span class="text-slate-500">Size:</span> 18.5 MB
            </div>
        </div>

        <!-- Download Button -->
        <a href="https://drive.google.com/uc?export=download&id=1veIh784ZdgP5FEKeIoOB8f39JFWcVWNe" 
           class="inline-block w-full py-4 px-8 bg-green-500 hover:bg-green-400 text-white font-bold rounded-xl shadow-lg shadow-green-900/20 transition-all active:scale-95 text-lg">
            Download APK
        </a>

        <p class="mt-6 text-xs text-slate-500 uppercase tracking-widest">
            Secure Download via Google Drive
        </p>

        <!-- Helpful Tip -->
        <div id="notice" class="mt-8 p-4 bg-blue-500/10 rounded-lg text-left border border-blue-500/20">
            <div class="flex gap-3">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-blue-400 shrink-0" viewBox="0 0 20 20" fill="currentColor">
                  <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd" />
                </svg>
                <p class="text-xs text-blue-300 leading-tight">
                    If the download doesn't start, ensure you have enabled "Install from Unknown Sources" in your Android settings.
                </p>
            </div>
        </div>
    </div>

</body>
</html>
